name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on:
    - ubuntu-latest
    - windows-latest

    steps:
    - uses: actions/checkout@v3
    - name: Build
      run: cargo build --features=all --release --verbose
    - name: Run tests
      run: cargo test --features=all --release --verbose
